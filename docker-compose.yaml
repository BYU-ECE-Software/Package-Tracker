services:

  app:
    build:
      context: .
      target: runner
    container_name: ece_mail_app
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      createbuckets:
        condition: service_completed_successfully
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -fsS http://localhost:3000/api/health >/dev/null || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    restart: unless-stopped
    networks:
      - ece_mail_network

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: ece_mail_nginx
    depends_on:
      app:
        condition: service_started
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/healthy | grep -q OK"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    ports:
      - "80:80"
      - "443:443"
    networks:
      - ece_mail_network

  db:
    image: postgres:16
    container_name: ece_mail_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    restart: unless-stopped
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB} && psql -U ${POSTGRES_USER} -d ${POSTGRES_DB} -c 'SELECT 1'",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ece_mail_network

networks:
  ece_mail_network:
    driver: bridge

volumes:
  db_data: